on:
  push:
    branches:
      - release-please

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v3
        id: release
        with:
          command: manifest
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
        if: ${{ steps.release.outputs.releases_created }}
      - run: npm install -g yarn
        if: ${{ steps.release.outputs.releases_created }}
      - run: yarn
        if: ${{ steps.release.outputs.releases_created }}
      # Build compiled output into dist/ so we publish JS, not raw TypeScript source.
      - run: yarn build:all
        if: ${{ steps.release.outputs.releases_created }}
      - run: npm publish dist/packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs.releases_created }}
      - run: npm publish dist/packages/eslint-plugin --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        if: ${{ steps.release.outputs.releases_created }}
